[tools]
"aqua:jdx/hk" = "1.48.0"
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:zizmorcore/zizmor" = "1.25.2"
jq = "1.8.1"
node = "24.16.0"
"npm:ajv-cli" = "5.0.0"

[tasks.setup]
description = "Install tools and configure Git hooks"
depends = ["hooks:install"]

[tasks."hooks:install"]
description = "Install hk Git hooks"
run = "hk install"

[tasks.check]
description = "Run all repository checks"
depends = ["lint", "test", "check:actions"]

[tasks.lint]
description = "Run project lint gates"
run = "hk check"

[tasks.test]
description = "Run tests for this repository"
depends = ["check:json", "check:schema", "check:fixtures", "check:conformance"]

[tasks."check:json"]
description = "Validate JSON and JSONL syntax"
run = """
jq empty schema/*.json fixtures/validation/*.json
find fixtures/validation -name '*.trail.jsonl' -print0 | xargs -0 -n1 jq empty
"""

[tasks."check:schema"]
description = "Validate JSON Schema artifacts and fixture manifest"
run = """
ajv compile --spec=draft2020 --strict=false --validate-formats=false -s schema/draft.json
ajv compile --spec=draft2020 --strict=false --validate-formats=false -s schema/v0.1.0.json
ajv compile --spec=draft2020 --strict=false --validate-formats=false -s fixtures/validation/manifest.schema.json
ajv validate --spec=draft2020 --strict=false --validate-formats=false -s fixtures/validation/manifest.schema.json -d fixtures/validation/manifest.json
"""

[tasks."check:fixtures"]
description = "Validate fixture manifest integrity"
run = """
manifest_paths=$(mktemp)
fixture_paths=$(mktemp)
trap 'rm -f "$manifest_paths" "$fixture_paths"' EXIT

jq -r '.fixtures[].path' fixtures/validation/manifest.json | sort > "$manifest_paths"
find fixtures/validation -name '*.trail.jsonl' -print | sed 's#^fixtures/validation/##' | sort > "$fixture_paths"

if [ "$(jq -r '.fixtures[].path' fixtures/validation/manifest.json | sort | uniq -d | wc -l | tr -d ' ')" != "0" ]; then
  echo "Duplicate fixture path in fixtures/validation/manifest.json"
  jq -r '.fixtures[].path' fixtures/validation/manifest.json | sort | uniq -d
  exit 1
fi

if ! diff -u "$manifest_paths" "$fixture_paths"; then
  echo "Fixture manifest does not match committed .trail.jsonl files"
  exit 1
fi
"""

[tasks."check:conformance"]
description = "Validate conformance manifest documentation and diagnostic registry"
run = "node scripts/check-conformance.mjs"

[tasks."check:actions"]
description = "Validate GitHub Actions workflows"
run = "if [ -d .github/workflows ]; then actionlint && zizmor .github/workflows; else echo 'No GitHub Actions workflows configured.'; fi"
